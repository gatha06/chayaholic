<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chayaholic ☕</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bubbles"></div>
  <div class="container">
    <h1>☕ Chayaholic</h1>
    <p class="tagline">Find your tea’s true vibe — strong, medium, or light 🍃</p>

    <div class="card">
      <input id="ingredients" type="text" placeholder="Enter tea ingredients (e.g., ginger, milk, sugar)" />
      <button onclick="analyzeTea()">Check My Tea</button>
      <div id="result" class="result"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
